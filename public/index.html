<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coin Flipper</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      padding: 40px;
      max-width: 500px;
      width: 100%;
      text-align: center;
      position: relative;
    }

    h1 {
      color: #333;
      margin-bottom: 30px;
      font-size: 2.5em;
    }

    .coin-display {
      width: 200px;
      height: 200px;
      margin: 40px auto;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 50%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: white;
      font-weight: bold;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
      transition: transform 0.6s ease;
      min-height: 200px;
    }

    .coin-emoji {
      font-size: 3.5em;
      margin-bottom: 5px;
    }

    .coin-text {
      font-size: 1.8em;
      letter-spacing: 2px;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
    }

    .coin-display.spinning {
      animation: spin 0.6s ease-in-out;
    }

    .coin-display.heads {
      background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
    }

    .coin-display.tails {
      background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
    }

    @keyframes spin {
      0% { transform: rotateY(0deg) rotateX(0deg); }
      50% { transform: rotateY(360deg) rotateX(180deg); }
      100% { transform: rotateY(720deg) rotateX(0deg); }
    }

    .result {
      margin-top: 30px;
      font-size: 1.2em;
      color: #666;
      min-height: 30px;
    }

    .result.show {
      font-size: 1.5em;
      color: #667eea;
      font-weight: bold;
    }

    .flip-form {
      margin-top: 16px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      text-align: left;
    }

    .flip-form .full {
      grid-column: 1 / -1;
    }

    .flip-form label {
      font-size: 0.85em;
      color: #666;
      margin-bottom: 4px;
      display: block;
    }

    .flip-form input,
    .flip-form select,
    .flip-form textarea {
      width: 100%;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 0.95em;
      outline: none;
    }

    .flip-form textarea {
      resize: vertical;
      min-height: 64px;
    }

    .flip-form input:focus,
    .flip-form select:focus,
    .flip-form textarea:focus {
      border-color: #667eea;
      box-shadow: 0 0 0 2px rgba(102, 126, 234, 0.16);
    }

    .note {
      grid-column: 1 / -1;
      font-size: 0.8em;
      color: #888;
      margin-top: -2px;
    }

    button {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      padding: 15px 40px;
      font-size: 1.1em;
      border-radius: 50px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      margin-top: 20px;
      font-weight: bold;
    }

    button:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .stats {
      margin-top: 40px;
      padding-top: 30px;
      border-top: 2px solid #eee;
      text-align: left;
    }

    .stat-item {
      display: flex;
      justify-content: space-between;
      padding: 10px 0;
      color: #666;
    }

    .stat-value {
      font-weight: bold;
      color: #333;
    }

    .flip-count {
      margin-top: 20px;
      padding: 15px;
      background: #f5f5f5;
      border-radius: 10px;
      color: #667eea;
      font-weight: bold;
    }

    .flip-history {
      margin-top: 30px;
      padding-top: 30px;
      border-top: 2px solid #eee;
      text-align: left;
    }

    .flip-history h3 {
      color: #333;
      margin-bottom: 15px;
      font-size: 1.1em;
    }

    .flip-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px;
      background: #f9f9f9;
      border-radius: 8px;
      margin-bottom: 10px;
      border-left: 4px solid #667eea;
    }

    .flip-result {
      font-weight: bold;
      font-size: 1.2em;
      color: #667eea;
      min-width: 80px;
    }

    .flip-meta {
      font-size: 0.85em;
      color: #666;
      margin-top: 4px;
      line-height: 1.35;
    }

    .flip-time {
      color: #999;
      font-size: 0.9em;
      text-align: right;
    }

    .ghost-admin {
      position: absolute;
      right: 8px;
      bottom: 8px;
      display: flex;
      gap: 6px;
      align-items: center;
      opacity: 0.14;
      transition: opacity 0.2s ease;
      z-index: 3;
    }

    .ghost-admin:hover {
      opacity: 0.28;
    }

    .ghost-admin-btn {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      border: 1px solid rgba(102, 126, 234, 0.35);
      background: rgba(102, 126, 234, 0.16);
      padding: 0;
      margin: 0;
      cursor: pointer;
      box-shadow: none;
    }

    .ghost-admin-btn:hover {
      transform: none;
      box-shadow: none;
      background: rgba(102, 126, 234, 0.26);
    }

    .ghost-admin-btn.active {
      border-color: rgba(0, 0, 0, 0.4);
      background: rgba(0, 0, 0, 0.24);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🪙 Coin Flipper</h1>
    
    <div class="coin-display" id="coinDisplay">
      <div class="coin-emoji">?</div>
      <div class="coin-text"></div>
    </div>
    
    <div class="result" id="result"></div>

    <div class="flip-form">
      <div class="full">
        <label for="playerName">Your name (required)</label>
        <input id="playerName" maxlength="40" placeholder="Enter your name" autocomplete="name" />
      </div>
      <div>
        <label for="headsConsequence">If heads wins...</label>
        <input id="headsConsequence" maxlength="180" placeholder="Consequence for heads" />
      </div>
      <div>
        <label for="tailsConsequence">If tails wins...</label>
        <input id="tailsConsequence" maxlength="180" placeholder="Consequence for tails" />
      </div>
      <div class="full">
        <label for="betText">Optional text bet</label>
        <textarea id="betText" maxlength="140" placeholder="Write out the bet terms"></textarea>
      </div>
      <div class="note">Name is required. Bet text and consequences are optional, but saved in history if provided.</div>
    </div>
    
    <button id="flipBtn" onclick="flipCoin()">FLIP COIN</button>
    
    <div class="stats">
      <div class="flip-count">
        Total Flips: <span id="totalFlips">0</span>
      </div>
      <div class="stat-item">
        <span>Heads:</span>
        <span class="stat-value" id="headsCount">0</span>
      </div>
      <div class="stat-item">
        <span>Tails:</span>
        <span class="stat-value" id="tailsCount">0</span>
      </div>

      <div class="flip-history">
        <h3>📜 Recent Flips</h3>
        <div id="flipHistoryList"></div>
      </div>
    </div>

    <div class="ghost-admin" aria-hidden="false">
      <button
        id="ghostHeads"
        class="ghost-admin-btn"
        type="button"
        title="Preset next flip to heads"
        onclick="presetNextFlip('heads')"
      ></button>
      <button
        id="ghostTails"
        class="ghost-admin-btn"
        type="button"
        title="Preset next flip to tails"
        onclick="presetNextFlip('tails')"
      ></button>
    </div>
  </div>

  <script>
    let isFlipping = false;
    let activePreset = null;

    async function presetNextFlip(outcome) {
      try {
        await fetch('/api/admin/set-outcome', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ outcome })
        });

        activePreset = outcome;
        updateGhostButtons();
      } catch (error) {
        console.error('Error setting hidden preset:', error);
      }
    }

    function updateGhostButtons() {
      const headsBtn = document.getElementById('ghostHeads');
      const tailsBtn = document.getElementById('ghostTails');

      headsBtn.classList.toggle('active', activePreset === 'heads');
      tailsBtn.classList.toggle('active', activePreset === 'tails');
    }

    async function flipCoin() {
      if (isFlipping) return;

      isFlipping = true;
      const flipBtn = document.getElementById('flipBtn');
      const coinDisplay = document.getElementById('coinDisplay');
      const result = document.getElementById('result');
      const playerNameInput = document.getElementById('playerName');
      const betTextInput = document.getElementById('betText');
      const headsConsequenceInput = document.getElementById('headsConsequence');
      const tailsConsequenceInput = document.getElementById('tailsConsequence');
      const playerName = playerNameInput.value.trim();
      const betText = betTextInput.value.trim();
      const headsConsequence = headsConsequenceInput.value.trim();
      const tailsConsequence = tailsConsequenceInput.value.trim();

      if (!playerName) {
        result.textContent = 'Please enter your name before flipping.';
        result.classList.add('show');
        isFlipping = false;
        return;
      }

      flipBtn.disabled = true;
      coinDisplay.classList.add('spinning');
      coinDisplay.classList.remove('heads', 'tails');
      coinDisplay.querySelector('.coin-emoji').textContent = '🔄';
      coinDisplay.querySelector('.coin-text').textContent = '';
      result.textContent = '';
      result.classList.remove('show');

      try {
        const payload = {
          playerName,
          betText: betText || null,
          headsConsequence: headsConsequence || null,
          tailsConsequence: tailsConsequence || null
        };

        const response = await fetch('/api/flip', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        if (!response.ok) {
          const errorData = await response.json();
          throw new Error(errorData.error || 'Flip failed');
        }

        const data = await response.json();

        setTimeout(() => {
          coinDisplay.classList.remove('spinning');
          const resultClass = data.result === 'heads' ? 'heads' : 'tails';
          coinDisplay.classList.add(resultClass);
          coinDisplay.querySelector('.coin-emoji').textContent = '🪙';
          coinDisplay.querySelector('.coin-text').textContent = data.result.toUpperCase();
          const baseText = `${data.playerName}: ${data.result.toUpperCase()}`;
          const consequenceText = data.resolvedConsequence ? ` -> ${data.resolvedConsequence}` : '';
          result.textContent = `${baseText}${consequenceText}`;
          result.classList.add('show');

          // Preset only affects one flip; clear local state after result is shown.
          activePreset = null;
          updateGhostButtons();

          flipBtn.disabled = false;
          isFlipping = false;

          updateStats();
        }, 600);
      } catch (error) {
        console.error('Error:', error);
        coinDisplay.classList.remove('spinning');
        coinDisplay.querySelector('.coin-emoji').textContent = '❌';
        coinDisplay.querySelector('.coin-text').textContent = 'ERROR';
        result.textContent = error.message || 'Error occurred';
        flipBtn.disabled = false;
        isFlipping = false;
      }
    }

    async function updateStats() {
      try {
        const response = await fetch('/api/flip-history');
        const history = await response.json();

        const headsCount = history.filter(f => f.result === 'heads').length;
        const tailsCount = history.filter(f => f.result === 'tails').length;

        document.getElementById('totalFlips').textContent = history.length;
        document.getElementById('headsCount').textContent = headsCount;
        document.getElementById('tailsCount').textContent = tailsCount;

        // Update flip history display (show last 5 flips in reverse order)
        const recentFlips = history.slice(-5).reverse();
        const historyList = document.getElementById('flipHistoryList');
        
        if (recentFlips.length === 0) {
          historyList.innerHTML = '<p style="color: #999; text-align: center;">No flips yet</p>';
        } else {
          historyList.innerHTML = recentFlips.map((flip) => {
            const date = new Date(flip.timestamp);
            const timeStr = date.toLocaleTimeString();
            const dateStr = date.toLocaleDateString();
            const resultEmoji = flip.result === 'heads' ? '🪙' : '🪙';
            const resultText = flip.result.toUpperCase();
            const playerText = flip.playerName ? `By: ${flip.playerName}` : 'By: Unknown';
            let betInfoText = 'No text bet';
            if (flip.betText) {
              const headsText = flip.headsConsequence ? `Heads: ${flip.headsConsequence}` : 'Heads: -';
              const tailsText = flip.tailsConsequence ? `Tails: ${flip.tailsConsequence}` : 'Tails: -';
              const outcomeText = flip.resolvedConsequence ? `Outcome: ${flip.resolvedConsequence}` : 'Outcome: -';
              betInfoText = `Bet: ${flip.betText}<br>${headsText}<br>${tailsText}<br>${outcomeText}`;
            }

            return `
              <div class="flip-item">
                <div>
                  <div class="flip-result">${resultEmoji} ${resultText}</div>
                  <div class="flip-meta">${playerText}<br>${betInfoText}</div>
                </div>
                <span class="flip-time">${timeStr}<br>${dateStr}</span>
              </div>
            `;
          }).join('');
        }
      } catch (error) {
        console.error('Error updating stats:', error);
      }
    }

    // Initial load
    updateStats();
  </script>
</body>
</html>
